add_newline = true
scan_timeout = 30
command_timeout = 500

format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$time\n  \
[у±Ю™](fg:iris) \
"""

palette = "rose-pine"

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[оВґ](fg:overlay)[ $path ]($style)[оВі](fg:overlay) "
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
Documents = "у∞ИЩ"
Downloads = "пАЩ "
Music = "пАБ "
Pictures = "пАЊ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оВґ](fg:overlay)[ $symbol $branch ]($style)[оВі](fg:overlay) "
style = "bg:overlay fg:foam"
symbol = "пРШ"

[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[оВґ](fg:overlay)([$all_status$ahead_behind]($style))[оВі](fg:overlay) '
up_to_date = '[ вЬУ ](bg:overlay fg:iris)'
untracked = '[?\($count\)](bg:overlay fg:gold)'
stashed = '[\$](bg:overlay fg:iris)'
modified = '[!\($count\)](bg:overlay fg:gold)'
renamed = '[¬ї\($count\)](bg:overlay fg:iris)'
deleted = '[вЬШ\($count\)](style)'
staged = '[++\($count\)](bg:overlay fg:gold)'
ahead = '[вЗ°\(${count}\)](bg:overlay fg:foam)'
diverged = 'вЗХ[\[](bg:overlay fg:iris)[вЗ°\(${ahead_count}\)](bg:overlay fg:foam)[вЗ£\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = '[вЗ£\(${count}\)](bg:overlay fg:rose)'

[time]
disabled = false
format = " [оВґ](fg:overlay)[ $time ]($style)[оВі](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оВґ](fg:overlay)[ $user ]($style)[оВі](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

