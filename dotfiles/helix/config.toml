theme = "rose_pine_moon"


[editor]
line-number = "relative"
mouse = false
auto-save = true
color-modes = true
bufferline = "multiple"
auto-format = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "file-name"]
right = ["diagnostics", "selections", "position", "file-encoding"]

