# Background
confirm_os_window_close 0
window_padding_width 2
hide_window_decorations yes          # ghostty: gtk-titlebar = false

# Font
font_family      JetBrains Mono
font_size        13.0

# Shell integration
# Ghostty disables cursor tracking, sudo, and title — closest kitty equivalent:
shell_integration                    no-title

# Audio bell
enable_audio_bell no
visual_bell_duration 1.0

# Scrollbar
scrollbar hovered
scrollbar_jump_on_click yes
scrollbar_width 1.5
scrollbar_hover_width 1.5
scrollbar_radius 0.5
scrollbar_gap 0.7

# Scroll behavior
touch_scroll_multiplier 5.0

# Keybinds
map ctrl+c    copy_or_interrupt
map ctrl+v    paste_from_clipboard
map ctrl+enter no_op  

editor helix 

# Theme
# BEGIN_KITTY_THEME
# Rosé Pine Moon
include current-theme.conf
# END_KITTY_THEME
background         #000000
background_opacity 0.85
background_blur_radius 0